<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Malik Traders</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#0d1117;
color:white;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:60px auto;
padding:20px;
}

.card{
background:#161b22;
padding:25px;
border-radius:12px;
text-align:center;
}

.price{
font-size:35px;
color:#00e676;
margin:20px 0;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#00c853;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#00e676;
color:black;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>💳 Checkout</h2>
<div style="
background:#1f2937;
padding:12px;
border-radius:8px;
margin:20px 0;
border-left:4px solid #00e676;
">

<h3 style="color:#00e676;margin-bottom:10px;">
🛡️ Why Choose Malik Traders?
</h3>

<p style="font-size:14px;line-height:26px;">

✅ High Accuracy Signals<br>

✅ Live Entry & Exit Updates<br>

✅ Strict Risk Management<br>

✅ Premium Support

</p>

</div>

<h3 id="planName">Loading...</h3>

<div class="price" id="amount">
₹0
</div>

<p>
🔒 Secure Payment Powered by Razorpay
</p>

<button id="payBtn">
Pay Now
</button>
<br><br>

<p style="color:#00e676;font-size:15px;">
✅ 100% Secure Payment
</p>

<p style="color:#9ca3af;font-size:13px;">
Your Premium Membership will be activated automatically after successful payment.
</p>

</div>

</div>

<script>

const plan=localStorage.getItem("plan");
const amount=localStorage.getItem("amount");

document.getElementById("planName").innerText=plan;
document.getElementById("amount").innerText="₹"+amount;

document.getElementById("payBtn").onclick=function(){

alert("Razorpay Live Key आने के बाद Payment यहीं खुलेगा.");

}

</script>

</body>
</html>
