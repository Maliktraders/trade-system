<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malik Traders Login</title>

<style>
body{
margin:0;
background:#0d1117;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
color:white;
}

.box{
background:#161b22;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 0 15px rgba(0,255,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#00c853;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00a844;
}
</style>

</head>

<body>

<div class="box">

<h2>Malik Traders Login</h2>

<input
id="email"
type="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button id="loginBtn">
Login
</button>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
